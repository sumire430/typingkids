    <!--
      目的:
      - 英語学習ではなく「文字とキーボードに親しむ」→「ローマ字入力」へつなぐ
      方針:
      - まずは"動く"ことを優先
      - 問題データは配列で管理し、あとから追加しやすくする
      - 失敗感が出ない言葉づかい（×/不正解/間違い などは使わない）

      使い方:
      - このファイルをブラウザで開くだけでOK（ビルド不要）
      - キーボード入力を使うので、画面をクリックしてから遊ぶと安心
    -->

          opacity: 0;
        }
        40% {
          transform: translateY(0px) scale(1.15);
          opacity: 1;
        }
        100% {
          transform: translateY(-22px) scale(1);
          opacity: 0;
        }
      }
      @keyframes screenPop {
        0% {
          transform: scale(0.98);
        }
        100% {
          transform: scale(1);
        }
      }
      .vk-pop-star {
        animation: popStar 520ms ease-out both;
      }
      .vk-screen-pop {
        animation: screenPop 160ms ease-out both;

      // -----------------------------

      const ALPHABETS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

      /*

        - データは配列で管理（追加しやすい）

        例:
        - し: shi / si
        - ち: chi / ti
        - つ: tsu / tu
        - ふ: fu / hu

        // ---- 拗音（ようおん）----

        // ぎゃ行（濁点）
        { hira: "ぎゃ", roma: "gya" },

        { hira: "ぎょ", roma: "gyo" },

        // しゃ行

        { hira: "しゅ", roma: "shu" },

        // じゃ行（濁点）
        { hira: "じゃ", roma: "ja" },
        { hira: "じゅ", roma: "ju" },
        { hira: "じょ", roma: "jo" },

        // ちゃ行

        // みゃ行

        // りゃ行
        { hira: "りゃ", roma: "rya" },
        { hira: "りゅ", roma: "ryu" },

        // ---- 小さい文字（IMEでよく使う）----

        { hira: "ちぇ", roma: "che" },
        { hira: "じぇ", roma: "je" },

        // てぃ/でぃ/てゅ/でゅ
        { hira: "てぃ", roma: "ti" },
        { hira: "でぃ", roma: "di" },
        { hira: "てゅ", roma: "tyu" },
        { hira: "でゅ", roma: "dyu" },

        // とぅ/どぅ
        { hira: "とぅ", roma: "tu" },
        { hira: "どぅ", roma: "du" },

        // つぁ/つぃ/つぇ/つぉ
        { hira: "つぁ", roma: "tsa" },
        { hira: "つぃ", roma: "tsi" },
        { hira: "つぇ", roma: "tse" },
        { hira: "つぉ", roma: "tso" },

        // ふぁ/ふぃ/ふぇ/ふぉ/ふゅ
        { hira: "ふぁ", roma: "fa" },
        { hira: "ふぃ", roma: "fi" },
        { hira: "ふぇ", roma: "fe" },
        { hira: "ふぉ", roma: "fo" },
        { hira: "ふゅ", roma: "fyu" },

        // すぁ/すぃ/すぅ/すぇ/すぉ（たまに使う）
        { hira: "すぁ", roma: "swa" },
        { hira: "すぃ", roma: "swi" },
        { hira: "すぅ", roma: "swu" },
        { hira: "すぇ", roma: "swe" },
        { hira: "すぉ", roma: "swo" },

        // くぁ/くぃ/くぇ/くぉ（kwa系）
        { hira: "くぁ", roma: "kwa" },
        { hira: "くぃ", roma: "kwi" },
        { hira: "くぇ", roma: "kwe" },
        { hira: "くぉ", roma: "kwo" },

        // ぐぁ/ぐぃ/ぐぇ/ぐぉ（gwa系）
        { hira: "ぐぁ", roma: "gwa" },
        { hira: "ぐぃ", roma: "gwi" },
        { hira: "ぐぇ", roma: "gwe" },
        { hira: "ぐぉ", roma: "gwo" },

        // うぁ/うぃ/うぇ/うぉ（wha/wi/we/who系）
        { hira: "うぁ", roma: "wha" },
        { hira: "うぃ", roma: "wi" },
        { hira: "うぇ", roma: "we" },
        { hira: "うぉ", roma: "who" },

        // いぇ（ye）
        { hira: "いぇ", roma: "ye" },

        // ゔ（ヴ相当）
        { hira: "ゔ", roma: "vu" },
        { hira: "ゔぁ", roma: "va" },
        { hira: "ゔぃ", roma: "vi" },
        { hira: "ゔぇ", roma: "ve" },

        { hira: "ゔょ", roma: "vyo" },

        // ゐ/ゑ（古い表記だがローマ字入力で入れられる）
        { hira: "ゐ", roma: "wi" },
        { hira: "ゑ", roma: "we" },
      ];

      // 受け付けたい別の打ち方（IMEでよく使われる）
      const ROMAJI_ALIASES = {
        し: ["shi", "si"],
        ち: ["chi", "ti"],
        つ: ["tsu", "tu"],
        ふ: ["fu", "hu"],
        じ: ["ji", "zi"],
        ぢ: ["ji", "di"],
        づ: ["zu", "du"],
        を: ["wo", "o"],
        ん: ["n", "nn"],

        // 拗音の別の打ち方（よくあるもの）
        しゃ: ["sha", "sya"],
        しゅ: ["shu", "syu"],
        しょ: ["sho", "syo"],

        ちゃ: ["cha", "tya", "cya"],
        ちゅ: ["chu", "tyu", "cyu"],
        ちょ: ["cho", "tyo", "cyo"],

        じゃ: ["ja", "jya", "zya"],
        じゅ: ["ju", "jyu", "zyu"],
        じょ: ["jo", "jyo", "zyo"],

        // 小さい文字（x / l どちらでもOKに）
        ぁ: ["xa", "la"],
        ぃ: ["xi", "li", "xyi", "lyi"],
        ぅ: ["xu", "lu"],
        ぇ: ["xe", "le"],
        ぉ: ["xo", "lo"],
        ゃ: ["xya", "lya"],
        ゅ: ["xyu", "lyu"],
        ょ: ["xyo", "lyo"],
        っ: ["xtu", "ltu", "xtsu", "ltsu"],
        ゎ: ["xwa", "lwa"],

        // 追加の音（別の打ち方があるものだけ）
        しぇ: ["she", "sye"],
        ちぇ: ["che", "tye", "cye"],
        じぇ: ["je", "jye", "zye"],

        てぃ: ["ti", "tei", "texi", "teli"],
        でぃ: ["di", "dexi", "deli"],
        てゅ: ["tyu", "teyu"],
        でゅ: ["dyu", "deyu"],

        とぅ: ["tu", "twu"],
        どぅ: ["du", "dwu"],

        つぁ: ["tsa", "tuxa", "tsuxa", "ltusa", "xtusa"],
        つぃ: ["tsi", "tuxi", "tsuxi"],
        つぇ: ["tse", "tuxe", "tsuxe"],
        つぉ: ["tso", "tuxo", "tsuxo"],

        ふぁ: ["fa", "fwa", "huxa", "hula"],
        ふぃ: ["fi", "fwi", "huxi", "huli"],
        ふぇ: ["fe", "fwe", "huxe", "hule"],
        ふぉ: ["fo", "fwo", "huxo", "hulo"],

        ゔ: ["vu"],
        ゔぁ: ["va"],
        ゔぃ: ["vi"],
        ゔぇ: ["ve"],
        ゔぉ: ["vo"],
      };

      // アプリ側で使う形式（answers は候補配列）
      const ROMAJI_ITEMS = ROMAJI_MAP.map((x) => {
        const primary = String(x.roma).toLowerCase();
        const candidates = ROMAJI_ALIASES[x.hira]
          ? ROMAJI_ALIASES[x.hira].map((s) => s.toLowerCase())
          : [primary];
        // primary が先頭になるように整える
        const answers = [primary, ...candidates.filter((c) => c !== primary)];
        return { kana: x.hira, answers };
      });

      // タイピングチャレンジに出す問題（まずはローマ字れんしゅう分でOK）
      const CHALLENGE_ITEMS = ROMAJI_ITEMS.map((x) => ({
        label: `${x.kana}`,
        answers: x.answers,
        hint: x.answers.length > 1 ? `${x.kana} は「${x.answers[0]}」（ほか: ${x.answers.slice(1).join(" / ")}）` : `${x.kana} は「${x.answers[0]}」`,
      }));

      const HAPPY_MESSAGES = [
        "すごい！",
        "できたね！",
        "いいね！",
        "そのちょうし！",
        "もう1こやってみよう！",
        "キラキラ！",
      ];

      const TRY_AGAIN_MESSAGES = [
        "おしい！",
        "もういちどやってみよう",
        "ゆっくりでだいじょうぶ",
        "あとちょっと！",
      ];

      // -----------------------------
      // 小さな便利関数
      // -----------------------------
      function pickRandom(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }

      function kataToHira(str) {
        // カタカナをひらがなに（日本語キーボード入力のゆれ対策）
        return String(str).replace(/[\u30a1-\u30f6]/g, (ch) => String.fromCharCode(ch.charCodeAt(0) - 0x60));
      }

      // -----------------------------
      // ステージ(10問)の共通ロジック
      // -----------------------------
      const STAGE_GOAL = 10;

      function calcRank({ totalMs, mistakes }) {
        // ざっくり評価（子ども向けに簡単でOK）
        // - S: ミスなし + 速い
        // - A: ミス少なめ
        // - B: ふつう
        // - C: ゆっくり
        const fast = totalMs <= 22000; // 10問で22秒以内（目安）
        const normal = totalMs <= 45000;

        if (mistakes === 0 && fast) return "S";
        if (mistakes <= 2 && normal) return "A";
        if (normal || mistakes <= 6) return "B";
        return "C";
      }

      function calcStars(rank) {
        // 星は「ごほうび」なのでシンプルに
        if (rank === "S") return 3;
        if (rank === "A") return 2;
        if (rank === "B") return 1;
        return 1;
      }

      // -----------------------------
      // 効果音（HTML5 Audio API）
      // - iOSは「最初のユーザー操作」が必要なので、キー/タップで鳴らす
      // -----------------------------
      const SOUND_URLS = {
        correct: "https://actions.google.com/sounds/v1/cartoon/pop.ogg",
        miss: "https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg",
        clear: "https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg",
      };

      const _audioCache = {};
      function playSound(kind) {
        try {
          const url = SOUND_URLS[kind];
          if (!url) return;
          if (!_audioCache[kind]) {
            const a = new Audio(url);
            a.preload = "auto";
            _audioCache[kind] = a;
          }
          const a = _audioCache[kind];
          a.currentTime = 0;
          a.volume = kind === "miss" ? 0.35 : 0.5;
          a.play().catch(() => {});
        } catch (e) {
          // 音が鳴らない環境でもアプリは動くように
        }
      }
      const playCorrectSound = () => playSound("correct");
      const playMissSound = () => playSound("miss");
      const playClearSound = () => playSound("clear");

      function StageClearScreen({
        title = "クリア！すごいね！",
        rank,
        stars,
        totalMs,
        mistakes,
        onRetry,
        onHome,
      }) {
        const seconds = Math.max(1, Math.round(totalMs / 1000));
        return (
          <div className="max-w-3xl mx-auto p-4 sm:p-6">
            <TopBar title="ステージ クリア 🎉" onHome={onHome} />
            <Card className="p-6 sm:p-8">
              <div className="rounded-3xl bg-mintP/70 border border-white/70 shadow-soft p-6 sm:p-8">
                <div className="text-3xl sm:text-4xl font-black">{title}</div>
                <div className="mt-3 text-lg sm:text-xl font-extrabold">
                  ⭐{" "}
                  <span className="tracking-widest">
                    {"⭐".repeat(stars)}
                  </span>
                </div>
                <div className="mt-4 grid grid-cols-2 gap-3">
                  <Pill label="ランク" value={rank} tone="lemon" />
                  <Pill label="じかん" value={`${seconds}びょう`} tone="sky" />
                  <Pill label="おしい（ミス）" value={`${mistakes}`} tone="peach" />
                  <Pill label="ステージ" value={`${STAGE_GOAL}もん`} tone="mint" />
                </div>
              </div>

              <div className="mt-5 grid grid-cols-1 sm:grid-cols-2 gap-3">
                <BigButton onClick={onRetry} tone="sky">
                  もういっかい 🔁
                </BigButton>
                <BigButton onClick={onHome} tone="mint">
                  おうちへ 🏠
                </BigButton>
              </div>
            </Card>
          </div>
        );
      }

      function PopStar({ tick }) {
        // tick が増えるたびにアニメが走るよう key を変える
        return (
          <div key={tick} className="pointer-events-none absolute inset-0 grid place-items-center">
            <div className="vk-pop-star text-5xl sm:text-6xl drop-shadow">⭐</div>
          </div>
        );
      }

      function normalizeKeyToChar(e) {
        // 子どもが使いやすいように、アルファベット1文字・スペース・バックスペースだけ扱う
        if (e.key === "Backspace") return { type: "backspace" };
        if (e.key === "Enter") return { type: "enter" };
        if (e.key === " ") return { type: "char", char: " " };
        if (e.key.length === 1) {
          const ch = e.key;
          // 英数字記号が来るので、まずは英字のみ採用（ローマ字入力の練習に寄せる）
          if (/^[a-zA-Z]$/.test(ch)) return { type: "char", char: ch.toLowerCase() };
        }
        return null;
      }

      // -----------------------------
      // UIパーツ
      // -----------------------------
      function Card({ children, className = "" }) {
        return (
          <div className={"rounded-3xl bg-white/85 shadow-soft border border-white/70 " + className}>
            {children}
          </div>
        );
      }

      function BigButton({ children, onClick, tone = "sky" }) {
        const toneClass =
          tone === "sky"
            ? "bg-skyP hover:bg-[#BFE1FF]"
            : tone === "mint"

      function useCoarsePointer() {
        const [isCoarse, setIsCoarse] = useState(false);
        useEffect(() => {
          const mq = window.matchMedia ? window.matchMedia("(pointer: coarse)") : null;
          const update = () => setIsCoarse(Boolean(mq && mq.matches));
          update();
          if (!mq) return;
          if (mq.addEventListener) mq.addEventListener("change", update);
          else mq.addListener(update);
          return () => {
            if (mq.removeEventListener) mq.removeEventListener("change", update);
            else mq.removeListener(update);
          };
        }, []);
        return isCoarse;
      }

      // -----------------------------
      // 共通: キー入力を聞く（画面ごとに使う）
      // -----------------------------
      function useTypingListener(enabled, onKey) {
        useEffect(() => {
          if (!enabled) return;
          const handler = (e) => {
            const info = normalizeKeyToChar(e);
            if (!info) return;
            // ブラウザの戻るなどを少しだけ防ぐ（Backspaceなど）
            if (info.type === "backspace") e.preventDefault();
            onKey(info);
          };
          window.addEventListener("keydown", handler);
          return () => window.removeEventListener("keydown", handler);
        }, [enabled, onKey]);
      }

      // -----------------------------
      // 画面: アルファベットであそぶ
      // -----------------------------
      function AlphabetPlay({ onHome }) {
        const isCoarse = useCoarsePointer();
        const [target, setTarget] = useState(() => pickRandom(ALPHABETS));
        const [lastPressed, setLastPressed] = useState("");
        const [message, setMessage] = useState("キーボードで おしてみよう！");
        const [sparkle, setSparkle] = useState(0);
        // ステージ用 state
        const [correctCount, setCorrectCount] = useState(0);
        const [mistakeCount, setMistakeCount] = useState(0);
        const [startTime, setStartTime] = useState(() => Date.now());
        const [clear, setClear] = useState(false);
        // 演出
        const [popTick, setPopTick] = useState(0);
        const [screenPop, setScreenPop] = useState(false);

        const next = () => {
          setTarget(pickRandom(ALPHABETS));
          setLastPressed("");
          setMessage("つぎの もじは なにかな？");
        };

        const resetStage = () => {
          setCorrectCount(0);
          setMistakeCount(0);
          setStartTime(Date.now());
          setClear(false);
          setSparkle(0);
          setMessage("キーボードで おしてみよう！");
          next();
        };

        const handleKey = (info) => {
          if (clear) return;
          if (info.type !== "char") return;
          const pressedUpper = info.char.toUpperCase();
          setLastPressed(pressedUpper);

          if (pressedUpper === target) {
            playCorrectSound();
            setMessage(pickRandom(HAPPY_MESSAGES));
            setSparkle((x) => x + 1);
            setPopTick((t) => t + 1);
            setScreenPop(true);
            setTimeout(() => setScreenPop(false), 170);
            // 少し待って次へ（テンポよく）
            setCorrectCount((c) => {
              const nextC = c + 1;
              if (nextC >= STAGE_GOAL) {
                setClear(true);
                playClearSound();
              } else {
                setTimeout(() => next(), 650);
              }
              return nextC;
            });
          } else {
            playMissSound();
            setMessage(pickRandom(TRY_AGAIN_MESSAGES));
            setMistakeCount((m) => m + 1);
          }
        };

        useTypingListener(true, handleKey);

        if (clear) {
          const totalMs = Date.now() - startTime;
          const rank = calcRank({ totalMs, mistakes: mistakeCount });
          const stars = calcStars(rank);
          return (
            <StageClearScreen
              rank={rank}
              stars={stars}
              totalMs={totalMs}
              mistakes={mistakeCount}
              onRetry={resetStage}

      // -----------------------------
      // 画面: ローマ字れんしゅう（うつ）
      // -----------------------------
      function RomajiPractice({ onHome }) {
        const isCoarse = useCoarsePointer();
        const [idx, setIdx] = useState(() => Math.floor(Math.random() * ROMAJI_ITEMS.length));
        const [typed, setTyped] = useState("");
        const [message, setMessage] = useState("ローマじで うってみよう！");
        const [okCount, setOkCount] = useState(0);
        // ステージ用 state
        const [correctCount, setCorrectCount] = useState(0);
        const [mistakeCount, setMistakeCount] = useState(0);
        const [startTime, setStartTime] = useState(() => Date.now());
        const [clear, setClear] = useState(false);
        // 演出
        const [popTick, setPopTick] = useState(0);
        const [screenPop, setScreenPop] = useState(false);

        const item = ROMAJI_ITEMS[idx];
        const primaryAnswer = item.answers[0];

        const next = () => {
          // 同じのが続きにくいようにちょっと工夫
          let nextIdx = Math.floor(Math.random() * ROMAJI_ITEMS.length);
          if (ROMAJI_ITEMS.length > 1 && nextIdx === idx) nextIdx = (nextIdx + 1) % ROMAJI_ITEMS.length;
          setIdx(nextIdx);
          setTyped("");
          setMessage("つぎも やってみよう！");
        };

        const resetStage = () => {
          setCorrectCount(0);
          setMistakeCount(0);
          setStartTime(Date.now());
          setClear(false);
          setOkCount(0);
          setTyped("");
          setMessage("ローマじで うってみよう！");
          next();
        };

        const handleKey = (info) => {
          if (clear) return;
          if (info.type === "backspace") {
            setTyped((t) => t.slice(0, -1));
            return;
          }
          if (info.type !== "char") return;

          setTyped((prev) => {
            const nextTyped = (prev + info.char).toLowerCase();

            // 途中チェック（合ってる方向ならそのまま）
            const isOnTrack = item.answers.some((a) => a.startsWith(nextTyped));
            if (isOnTrack) {
              // 完全一致なら正解として次へ
              const isDone = item.answers.some((a) => a === nextTyped);
              if (isDone) {
                playCorrectSound();
                setMessage(pickRandom(HAPPY_MESSAGES));
                setOkCount((c) => c + 1);
                setPopTick((t) => t + 1);
                setScreenPop(true);
                setTimeout(() => setScreenPop(false), 170);
                setTimeout(() => next(), 650);
                setCorrectCount((c) => {
                  const nextC = c + 1;
                  if (nextC >= STAGE_GOAL) {
                    setClear(true);
                    playClearSound();
                  }
                  return nextC;
                });
              } else {
                setMessage("いいね、そのまま！");
              }
              return nextTyped;
            }

            // 方向がズレたときは、いったん入力を戻してやさしく促す
            playMissSound();
            setMessage(pickRandom(TRY_AGAIN_MESSAGES));
            setMistakeCount((m) => m + 1);
            return prev; // 変えない（増やさない）
          });
        };

        useTypingListener(true, handleKey);

        if (clear) {
          const totalMs = Date.now() - startTime;
          const rank = calcRank({ totalMs, mistakes: mistakeCount });
          const stars = calcStars(rank);
          return (
            <StageClearScreen
              rank={rank}
              stars={stars}
              totalMs={totalMs}
              mistakes={mistakeCount}
              onRetry={resetStage}
              onHome={onHome}
            />
          );
        }

        return (
          <div className="max-w-3xl mx-auto p-4 sm:p-6">
            <TopBar title="ローマじ れんしゅう（うつ）🌷" onHome={onHome} />
            <Card className={"p-6 sm:p-8 relative " + (screenPop ? "vk-screen-pop" : "")}>
              <PopStar tick={popTick} />
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div className="sm:col-span-2">
                  <div className="text-sm font-bold opacity-70">この ひらがな を ローマじで うってね</div>
                  <div className="mt-3 rounded-3xl bg-mintP/70 border border-white/70 shadow-soft p-6 sm:p-8 grid place-items-center">
                    <div className="text-7xl sm:text-8xl font-black">{item.kana}</div>
                  </div>
                  <div className="mt-4">
                    <InputBubble text={typed} placeholder="a / ka / shi など" />
                  </div>
                  {isCoarse ? (
                    <div className="mt-4">
                      <VirtualKeyboard onKey={handleKey} />
                    </div>
                  ) : null}
                </div>

                <div className="flex flex-col gap-4">
                  <div className="grid grid-cols-2 gap-3">
                    <Pill label="ステージ" value={`${correctCount}/${STAGE_GOAL}`} tone="mint" />
                    <Pill label="おしい" value={`${mistakeCount}`} tone="peach" />
                  </div>
                  <Pill label="できた数" value={`${okCount}`} tone="lemon" />
                  <div className="rounded-3xl bg-white/80 border border-white/70 shadow-soft p-4">
                    <div className="text-sm font-bold opacity-70">ヒント</div>
                    <div className="text-lg font-extrabold mt-1">
                      {item.kana} は「{primaryAnswer}」
                    </div>
                    {item.answers.length > 1 ? (
                      <div className="text-sm opacity-70 mt-1">ほか: {item.answers.slice(1).join(" / ")}</div>
                    ) : null}
                    <div className="text-sm opacity-70 mt-2">Backspace で けせるよ</div>
                  </div>
                  <BigButton onClick={next} tone="sky">
                    つぎへ ▶
                  </BigButton>
                </div>
              </div>

              <div className="mt-5 rounded-3xl bg-white/70 border border-white/70 p-4">
                <div className="text-lg sm:text-xl font-extrabold">{message} 🌼</div>
                <div className="text-sm opacity-70 mt-1">コツ：まずは ゆっくり「a」「k」「s」などを たしかめながらでOK</div>
              </div>
            </Card>
          </div>
        );
      }

                </div>

                <div className="flex flex-col gap-4">
                  <div className="grid grid-cols-2 gap-3">
                    <Pill label="ステージ" value={`${correctCount}/${STAGE_GOAL}`} tone="mint" />
                    <Pill label="おしい" value={`${mistakeCount}`} tone="peach" />
                  </div>
                  <Pill label="よめた数" value={`${count}`} tone="lemon" />
                  <BigButton onClick={next} tone="peach">
                    つぎへ ▶
                  </BigButton>
                  <div className="rounded-3xl bg-white/80 border border-white/70 shadow-soft p-4">
                    <div className="text-sm font-bold opacity-70">ヒント</div>
                    <div className="text-lg font-extrabold mt-1">
                      こたえ：{item.kana}
                    </div>
                    <div className="text-xs opacity-60 mt-1">（むずかしいときだけ みてね）</div>
                  </div>
                </div>
              </div>

              <div className="mt-5 rounded-3xl bg-white/70 border border-white/70 p-4">
                <div className="text-lg sm:text-xl font-extrabold">{message} 🌟</div>
                <div className="text-sm opacity-70 mt-1">ローマじ → ひらがな を つなげて みよう</div>
              </div>
            </Card>
          </div>
        );
      }

      // -----------------------------
      // 画面: タイピングれんしゅう（たんご）
      // -----------------------------
      const WORD_ITEMS = [
        // ひらがな表記と、入力したいローマ字（小文字）を用意（増やしやすい）
        { jp: "ねこ", answers: ["neko"] },
        { jp: "いぬ", answers: ["inu"] },
        { jp: "さかな", answers: ["sakana"] },
        { jp: "やま", answers: ["yama"] },
        { jp: "かわ", answers: ["kawa"] },
        { jp: "はな", answers: ["hana"] },
        { jp: "ほし", answers: ["hoshi"] },
        { jp: "つき", answers: ["tsuki", "tuki"] },
        { jp: "あめ", answers: ["ame"] },
        { jp: "ゆき", answers: ["yuki"] },
        { jp: "おにぎり", answers: ["onigiri"] },
        { jp: "さくら", answers: ["sakura"] },
        { jp: "ひこうき", answers: ["hikouki"] },
        { jp: "しゃしん", answers: ["shashin", "syasin"] },
        { jp: "ちゃわん", answers: ["chawan", "tyawan"] },
        { jp: "りんご", answers: ["ringo"] },
        { jp: "ぶどう", answers: ["budou"] },
        { jp: "ぴあの", answers: ["piano"] },
        { jp: "ぎゅうにゅう", answers: ["gyuunyuu"] },
        { jp: "きゃべつ", answers: ["kyabetsu"] },
      ];

      function WordTypingPractice({ onHome }) {
        const isCoarse = useCoarsePointer();
        const [q, setQ] = useState(() => pickRandom(WORD_ITEMS));
        const [typed, setTyped] = useState("");
        const [count, setCount] = useState(0);
        const [message, setMessage] = useState("たんごを ローマじで うってみよう！");
        // ステージ用 state
        const [correctCount, setCorrectCount] = useState(0);
        const [mistakeCount, setMistakeCount] = useState(0);
        const [startTime, setStartTime] = useState(() => Date.now());
        const [clear, setClear] = useState(false);
        // 演出
        const [popTick, setPopTick] = useState(0);
        const [screenPop, setScreenPop] = useState(false);

        const next = () => {
          setQ(pickRandom(WORD_ITEMS));
          setTyped("");
          setMessage("つぎの たんご！");
        };

        const resetStage = () => {
          setCorrectCount(0);
          setMistakeCount(0);
          setStartTime(Date.now());
          setClear(false);
          setCount(0);
          setTyped("");
          setMessage("たんごを ローマじで うってみよう！");
          next();
        };

        const handleKey = (info) => {
          if (clear) return;
          if (info.type === "backspace") {
            setTyped((t) => t.slice(0, -1));
            return;
          }
          if (info.type !== "char") return;

          setTyped((prev) => {
            const nextTyped = (prev + info.char).toLowerCase();
            const isOnTrack = q.answers.some((a) => a.startsWith(nextTyped));
            if (isOnTrack) {
              const isDone = q.answers.some((a) => a === nextTyped);
              if (isDone) {
                playCorrectSound();
                setMessage(pickRandom(HAPPY_MESSAGES));
                setCount((c) => c + 1);
                setPopTick((t) => t + 1);
                setScreenPop(true);
                setTimeout(() => setScreenPop(false), 170);
                setCorrectCount((c) => {
                  const nextC = c + 1;
                  if (nextC >= STAGE_GOAL) {
                    setClear(true);
                    playClearSound();
                  }
                  return nextC;
                });
                setTimeout(() => next(), 650);
              } else {
                setMessage("いいね、そのまま！");
              }
              return nextTyped;
            }
            playMissSound();
            setMessage(pickRandom(TRY_AGAIN_MESSAGES));
            setMistakeCount((m) => m + 1);
            return prev;
          });
        };

        useTypingListener(true, handleKey);

        if (clear) {
          const totalMs = Date.now() - startTime;
          const rank = calcRank({ totalMs, mistakes: mistakeCount });
          const stars = calcStars(rank);
          return (
            <StageClearScreen
              rank={rank}
              stars={stars}
              totalMs={totalMs}
              mistakes={mistakeCount}
              onRetry={resetStage}
              onHome={onHome}
            />
          );
        }

        const hint = q.answers.length > 1 ? `${q.answers[0]}（ほか: ${q.answers.slice(1).join(" / ")}）` : q.answers[0];

        return (
          <div className="max-w-3xl mx-auto p-4 sm:p-6">
            <TopBar title="タイピングれんしゅう（たんご）🍡" onHome={onHome} />
            <Card className={"p-6 sm:p-8 relative " + (screenPop ? "vk-screen-pop" : "")}>
              <PopStar tick={popTick} />
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div className="sm:col-span-2">
                  <div className="text-sm font-bold opacity-70">この たんごを うってね</div>
                  <div className="mt-3 rounded-3xl bg-peachP/70 border border-white/70 shadow-soft p-6 sm:p-8 grid place-items-center">
                    <div className="text-6xl sm:text-7xl font-black">{q.jp}</div>
                  </div>
                  <div className="mt-4">
                    <InputBubble text={typed} placeholder="ローマじで うってみよう" />
                  </div>
                  {isCoarse ? (
                    <div className="mt-4">
                      <VirtualKeyboard onKey={handleKey} />
                    </div>
                  ) : null}
                </div>

                <div className="flex flex-col gap-4">
                  <div className="grid grid-cols-2 gap-3">
                    <Pill label="ステージ" value={`${correctCount}/${STAGE_GOAL}`} tone="mint" />
                    <Pill label="おしい" value={`${mistakeCount}`} tone="peach" />
                  </div>
                  <Pill label="できた数" value={`${count}`} tone="lemon" />
                  <div className="rounded-3xl bg-white/80 border border-white/70 shadow-soft p-4">
                    <div className="text-sm font-bold opacity-70">ヒント</div>
                    <div className="text-lg font-extrabold mt-1">{hint}</div>
                    <div className="text-sm opacity-70 mt-2">Backspace で けせるよ</div>
                  </div>
                  <BigButton onClick={next} tone="mint">
                    つぎへ ▶
                  </BigButton>
                </div>
              </div>

              <div className="mt-5 rounded-3xl bg-white/70 border border-white/70 p-4">
                <div className="text-lg sm:text-xl font-extrabold">{message} 🍀</div>
                <div className="text-sm opacity-70 mt-1">ゆっくりでOK。つぎの 1もじだけ みて うとう</div>
              </div>
            </Card>
          </div>
        );
      }

      // -----------------------------
      // 画面: タイピングチャレンジ
      // -----------------------------
      function TypingChallenge({ onHome }) {
        const isCoarse = useCoarsePointer();
        const [q, setQ] = useState(() => pickRandom(CHALLENGE_ITEMS));
        const [typed, setTyped] = useState("");
        const [streak, setStreak] = useState(0);
        const [stars, setStars] = useState(0);
        const [message, setMessage] = useState("れんぞくで できるかな？");

        const next = () => {
          setQ(pickRandom(CHALLENGE_ITEMS));
          setTyped("");
          setMessage("よーい、どん！");
        };

        const handleKey = (info) => {
          if (info.type === "backspace") {
            setTyped((t) => t.slice(0, -1));
            return;
          }
          if (info.type !== "char") return;

          setTyped((prev) => {
            const nextTyped = (prev + info.char).toLowerCase();

            const isOnTrack = q.answers.some((a) => a.startsWith(nextTyped));
            if (isOnTrack) {
              const isDone = q.answers.some((a) => a === nextTyped);
              if (isDone) {
                setMessage(pickRandom(HAPPY_MESSAGES));
                setStreak((s) => {
                  const nextStreak = s + 1;
                  if (nextStreak % 3 === 0) setStars((st) => st + 1);
                  return nextStreak;
                });
                setTimeout(() => next(), 650);
              } else {
                setMessage("いいね！そのまま！");
              }
              return nextTyped;
            }

            // ズレた時は、続けて入力しない設計（打ち直しやすく）
            setMessage(pickRandom(TRY_AGAIN_MESSAGES));
            return prev;
          });
        };

        useTypingListener(true, handleKey);

        const starText = "⭐".repeat(Math.min(8, stars)) || "—";

        return (
          <div className="max-w-3xl mx-auto p-4 sm:p-6">
            <TopBar title="タイピングチャレンジ ⭐" onHome={onHome} />
            <Card className="p-6 sm:p-8">
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div className="sm:col-span-2">
                  <div className="text-sm font-bold opacity-70">いまの もんだい</div>
                  <div className="mt-3 rounded-3xl bg-peachP/70 border border-white/70 shadow-soft p-6 sm:p-8">
                    <div className="flex items-center justify-between gap-3">
                      <div>
                        <div className="text-6xl sm:text-7xl font-black">{q.label}</div>
                        <div className="text-sm sm:text-base opacity-70 mt-2">{q.hint}</div>
                      </div>
                      <div className="text-4xl hidden sm:block">🎯</div>
                    </div>
                  </div>

                  <div className="mt-4">
                    <InputBubble text={typed} placeholder="ローマじで うってみよう" />
                  </div>
                  {isCoarse ? (
                    <div className="mt-4">
                      <VirtualKeyboard onKey={handleKey} />
                    </div>
                  ) : null}
                </div>

                <div className="flex flex-col gap-4">
                  <Pill label="せいかい" value={`${streak}`} tone="mint" />
                  <Pill label="ほし（3こ せいかいで +1）" value={starText} tone="lemon" />
                  <BigButton onClick={next} tone="sky">
                    つぎの もんだい ▶
                  </BigButton>
                  <div className="rounded-3xl bg-white/80 border border-white/70 shadow-soft p-4">
                    <div className="text-sm font-bold opacity-70">コツ</div>
                    <div className="text-sm opacity-80 mt-1">
                      あわてなくてOK。つぎの 1もじだけ みて うってみよう。
                    </div>
                  </div>
                </div>
              </div>

              <div className="mt-5 rounded-3xl bg-white/70 border border-white/70 p-4">
                <div className="text-lg sm:text-xl font-extrabold">{message} 🎈</div>
                <div className="text-sm opacity-70 mt-1">ズレたときは、いったん止めて もういちど ゆっくりでOK</div>
              </div>
            </Card>
          </div>
        );
      }

      // -----------------------------
      // ルート
      // -----------------------------
      function App() {
        const [mode, setMode] = useState("home"); // home | alphabet | romajiType | romajiRead | words

        // iPad などでも "どこを押せばいいか" が分かりやすいように、背景をゆるくデコる
        return (
          <div className="min-h-screen">
            <div className="fixed inset-0 -z-10 overflow-hidden">
              <div className="absolute -top-24 -left-24 h-72 w-72 rounded-full bg-skyP/50 blur-2xl"></div>
              <div className="absolute top-32 -right-24 h-72 w-72 rounded-full bg-mintP/50 blur-2xl"></div>
              <div className="absolute bottom-0 left-1/3 h-72 w-72 rounded-full bg-peachP/50 blur-2xl"></div>
            </div>

            {mode === "home" && <Home go={setMode} />}
            {mode === "alphabet" && <AlphabetPlay onHome={() => setMode("home")} />}
            {mode === "romajiType" && <RomajiPractice onHome={() => setMode("home")} />}
            {mode === "romajiRead" && <RomajiReadPractice onHome={() => setMode("home")} />}
            {mode === "words" && <WordTypingPractice onHome={() => setMode("home")} />}

            <div className="max-w-3xl mx-auto px-4 pb-10 text-xs opacity-60">
              <div className="mt-6">
                ちいさなヒント：キー入力がうまく入らないときは、画面のどこかを1回クリックしてからためしてね。iPadはタッチキーボードでもOK。
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
